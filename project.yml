name: TheSignal
options:
  bundleIdPrefix: com.brendan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  TheSignal:
    type: application
    platform: iOS
    sources:
      - path: TheSignal
        excludes:
          - "ShareExtension/**" # separate extension target; add later if wanted
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: TheSignal/Info.plist
      properties:
        CFBundleDisplayName: The Signal
        UILaunchScreen: {}
        UIBackgroundModes: [audio]
        NSLocationWhenInUseUsageDescription: >-
          The Signal uses your location to fit episodes to your walk and end
          them as you arrive.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
